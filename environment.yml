name: cpr
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - networkx>=3.0
  - pandas>=2.0
  - matplotlib>=3.7
  - pot>=0.9
  - shapely>=2.0
  - pyyaml
  # Optional extras for the AC-OPF cross-validation, DiGress training,
  # and zero-shot inference. Comment out the groups you don't need.
  - pandapower>=2.14
  - pytorch>=2.0
  - osmnx>=2.0
  - rasterio>=1.3
  - pip:
      - -e .
